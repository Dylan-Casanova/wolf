server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php;

    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ESP32 stream feed — disable buffering for real-time streaming
    location ~ ^/api/device/stream/\d+/feed$ {
        client_max_body_size 0;
        client_body_timeout 130s;
        fastcgi_request_buffering off;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        include fastcgi_params;
        fastcgi_buffering off;
        fastcgi_read_timeout 130s;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffering off;
    }

    # Nginx-level health check (no PHP, used by Docker healthcheck)
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Deny dotfiles (except .well-known)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
